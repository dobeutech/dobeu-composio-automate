# dobeu-webhook-archive — wrangler config
# Deploys v5-cf-worker-webhook-archive.ts as `webhook-archive.dobeu.workers.dev`
# Source-of-truth: v5-final-consolidated-plan.md 0B.2 + 0B.4

name = "dobeu-webhook-archive"
main = "v5-cf-worker-webhook-archive.ts"
compatibility_date = "2026-04-20"
workers_dev = true

# Routes (uncomment for custom domain cutover post-shadow)
# [[routes]]
# pattern = "webhook-archive.dobeu.dev/*"
# zone_name = "dobeu.dev"

# --- R2 bucket binding (0B.2) -------------------------------------------------
[[r2_buckets]]
binding = "WEBHOOK_ARCHIVE"
bucket_name = "dobeu-webhook-archive"
preview_bucket_name = "dobeu-webhook-archive-preview"

# --- KV (optional second-layer idempotency cache) -----------------------------
# Create with: wrangler kv:namespace create IDEMPOTENCY_KV
[[kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "TODO_REPLACE_WITH_KV_ID"
preview_id = "TODO_REPLACE_WITH_KV_PREVIEW_ID"

# --- Service binding -> r2-signer worker (signed-URL egress, 15-min TTL) ------
[[services]]
binding = "R2_SIGNER"
service = "dobeu-r2-signer"
environment = "production"

# --- Non-secret vars ----------------------------------------------------------
[vars]
CF_ACCESS_TEAM = "dobeu.cloudflareaccess.com"
# CF_ACCESS_AUD is the Access application AUD tag — deploy-time var, not secret
CF_ACCESS_AUD = "TODO_CF_ACCESS_AUD_TAG"
SUPABASE_URL = "https://TODO_PROJECT_REF.supabase.co"

# --- Observability (top-level) ------------------------------------------------
# Structured JSON lines go to workers.dev Logs; Logpush forwards to Datadog
# Configure Logpush via Cloudflare dashboard — no wrangler field needed here.
[observability]
enabled = true
head_sampling_rate = 1.0

# --- Triggers (Datadog synthetic /health every 5 min handles heartbeat) -------
# No cron triggers needed — ingress is request-driven.

# --- Secrets (pull from Doppler → wrangler secret put) ------------------------
# Run these manually; DO NOT commit values. One-liner per secret:
#
# TODO: wrangler secret put STRIPE_WEBHOOK_SECRET
# TODO: wrangler secret put TYPEFORM_WEBHOOK_SECRET
# TODO: wrangler secret put INTERCOM_WEBHOOK_SECRET
# TODO: wrangler secret put APOLLO_WEBHOOK_SECRET
# TODO: wrangler secret put POSTHOG_WEBHOOK_SECRET
# TODO: wrangler secret put LINEAR_WEBHOOK_SIGNING_SECRET
# TODO: wrangler secret put WEBFLOW_WEBHOOK_SECRET
# TODO: wrangler secret put RUBE_MONITOR_SECRET
# TODO: wrangler secret put SUPABASE_EVENT_LEDGER_KEY
# TODO: wrangler secret put MAKE_HOOK_URLS_JSON        # JSON: {"stripe":"https://hook.us1.make.com/...","typeform":"...","intercom":"...","apollo":"...","posthog":"...","linear":"...","webflow":"...","rube":"..."}
# TODO: wrangler secret put EXCLUSION_ZONE_JSON        # JSON: {"github":["dobeutech/agent-usl-website","dobeutech/usl-agent-website"],"netlify":["e8cf44e2-089c-4f4c-8b10-1998df378cf7"]}
# TODO: wrangler secret put SENTRY_DSN                 # optional
# TODO: wrangler secret put DATADOG_API_KEY            # optional

# --- Staging / shadow environment (0B.4: 7-day shadow before cutover) ---------
[env.shadow]
name = "dobeu-webhook-archive-shadow"
workers_dev = true

[[env.shadow.r2_buckets]]
binding = "WEBHOOK_ARCHIVE"
bucket_name = "dobeu-webhook-archive"

[[env.shadow.services]]
binding = "R2_SIGNER"
service = "dobeu-r2-signer"
environment = "production"

[env.shadow.vars]
CF_ACCESS_TEAM = "dobeu.cloudflareaccess.com"
CF_ACCESS_AUD = "TODO_CF_ACCESS_AUD_TAG"
SUPABASE_URL = "https://TODO_PROJECT_REF.supabase.co"
